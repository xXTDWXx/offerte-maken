<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sunspa Categorie</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">Sunspa Catalogus</div>
      </div>
    </div>
  </header>

  <nav class="category-menu">
    <div class="container category-menu-row">
      <a href="category.html?type=Spa" class="category-link" data-category-link="Spa">SPA</a>
      <a href="category.html?type=Zwemspa" class="category-link" data-category-link="Zwemspa">ZWEMSPA</a>
      <a href="category.html?type=Barrelsauna" class="category-link" data-category-link="Barrelsauna">BARRELSAUNA</a>
      <a href="category.html?type=Infrarood" class="category-link" data-category-link="Infrarood">INFRAROOD</a>
      <a href="category.html?type=combi sauna" class="category-link" data-category-link="combi sauna">COMBI SAUNA</a>
      <a href="category.html?type=sauna" class="category-link" data-category-link="sauna">FINSE SAUNA</a>
      <a href="category.html?type=sauna pod" class="category-link" data-category-link="sauna pod">SAUNA POD</a>
      <a href="stroom.html" class="category-link">STROOMVEREISTEN</a>
      <a href="oppervlakte.html" class="category-link is-active">ZOEK UW IDEALE SPA</a>
    </div>
  </nav>

  <main class="container">
    <section class="panel">
      <div class="panel-row" style="justify-content:space-between; align-items:center;">
        <div>
          <div class="panel-title" id="pageTitle">Categorie</div>
          <div class="small" id="resultMetaTop">—</div>
        </div>
        <a href="index.html" class="btn">← Terug naar overzicht</a>
      </div>

      <div class="panel-row" id="filtersPanel" style="gap:16px; flex-wrap:wrap; align-items:end;">
        <div class="field">
          <label for="search">Zoeken</label>
          <input id="search" type="search" placeholder="Zoek op titel, type, specificaties…" />
        </div>

        <div class="field">
          <label for="brandFilter">Reeks</label>
          <select id="brandFilter">
            <option value="">Alle reeksen</option>
            <option value="Sunspa">Sunspa</option>
            <option value="Myspa">Myspa</option>
            <option value="Vogue">Vogue</option>
            <option value="Legend">Legend</option>
            <option value="Fox">Fox</option>
            <option value="Elite">Elite</option>
            <option value="Elite">Bullfrog</option>
          </select>
        </div>

        <div class="field">
          <label for="sort">Sorteren</label>
          <select id="sort">
            <option value="relevance">Relevantie</option>
            <option value="priceAsc">Prijs (laag → hoog)</option>
            <option value="priceDesc">Prijs (hoog → laag)</option>
            <option value="titleAsc">Titel (A → Z)</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="btnClear" class="btn" type="button">Wissen</button>
        </div>
      </div>

      <div class="panel-row panel-row-2">
        <div class="chips" id="activeChips"></div>
        <div class="small" id="resultMetaBottom">—</div>
      </div>
    </section>

    <section class="grid" id="grid"></section>

    <section class="panel" id="errorBox" style="display:none">
      <div class="panel-title">Fout bij laden</div>
      <div class="small" id="errorText"></div>
      <div class="small" style="margin-top:8px">
        Controleer of <code>products.json</code> bestaat en bereikbaar is.
      </div>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <button class="card-link" type="button" data-open>
        <div class="card-imgwrap">
          <img class="card-img" alt="" loading="lazy" />
          <div class="badge" data-badge></div>
          <div class="badge badge-location" data-showroom></div>
        </div>

        <div class="card-body">
          <div class="card-title" data-title></div>
          <div class="card-price" data-price></div>
          <div class="card-specs" data-specs></div>
          <div class="card-cta">👉 Bekijk details</div>
        </div>
      </button>
    </article>
  </template>

  <script src="category.js"></script>
</body>
</html>
