<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-row">
      <div>
        <div class="brand-title">SUNSPA BENELUX</div>
        <div class="brand-sub">Categorie overzicht</div>
      </div>
    </div>
  </header>

  <nav class="category-menu">
    <div class="container category-menu-row">
      <a href="category.html?type=Spa" class="category-link" data-category-link="Spa">Spa</a>
      <a href="category.html?type=Zwemspa" class="category-link" data-category-link="Zwemspa">Zwemspa</a>
      <a href="category.html?type=Barrel" class="category-link" data-category-link="Barrel">Barrelsauna</a>
      <a href="category.html?type=Infrarood" class="category-link" data-category-link="Infrarood">Infrarood</a>
      <a href="category.html?type=Finse" class="category-link" data-category-link="Finse">Sauna</a>
      <a href="category.html?type=Pod" class="category-link" data-category-link="Pod">Sauna Pod</a>
      <a href="category.html?type=Combi" class="category-link" data-category-link="Combi">Combi Sauna</a>
    </div>
  </nav>

  <main class="container">
    <section class="panel">
      <div class="panel-row panel-row-2">
        <div>
          <div class="panel-title" id="pageTitle">Categorie</div>
          <div class="small" id="resultMeta">0 producten</div>
        </div>
      </div>
    </section>

    <!-- Filters: alleen voor Spa -->
    <section class="panel" id="filtersPanel">
      <div class="panel-title">Filters</div>
      <div class="panel-row">
        <div class="field">
          <label for="searchInput">Zoeken</label>
          <input
            id="searchInput"
            type="text"
            placeholder="Zoek op naam, merk, afmetingen..."
          />
        </div>

        <div class="field">
          <label for="brandFilter">Merk</label>
          <select id="brandFilter">
            <option value="">Alle merken</option>
            <option value="Sunspa">Sunspa</option>
            <option value="Myspa">Myspa</option>
            <option value="Vogue">Vogue</option>
            <option value="Legend">Legend</option>
            <option value="Fox">Fox</option>
            <option value="Elite">Elite</option>
          </select>
        </div>

        <div class="field">
          <label for="sortFilter">Sorteer</label>
          <select id="sortFilter">
            <option value="">Standaard</option>
            <option value="price-asc">Prijs laag → hoog</option>
            <option value="price-desc">Prijs hoog → laag</option>
            <option value="title-asc">Naam A → Z</option>
          </select>
        </div>
      </div>
    </section>

    <section class="panel" id="errorBox" style="display:none;">
      <div class="panel-title">Fout</div>
      <div id="errorText"></div>
    </section>

    <section>
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <button class="card-link" data-open>
        <div class="card-imgwrap">
          <img class="card-img" src="" alt="" />
          <div class="badge" data-badge></div>
        </div>

        <div class="card-body">
          <div class="card-title" data-title></div>
          <div class="card-price" data-price></div>
          <div class="card-specs" data-specs></div>
          <div class="card-cta">Bekijk product</div>
        </div>
      </button>
    </article>
  </template>

  <script src="category.js"></script>
</body>
</html>
