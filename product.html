<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product • Offerte</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">Offerte samenstellen</div>
        <div class="brand-sub">Selecteer opties voor dit product.</div>
      </div>

      <div class="header-actions">
        <a class="btn btn-secondary" href="index.html">← Terug</a>
        <a class="btn btn-primary" href="cart.html">🧾 Offerte (<span id="cartCount">0</span>)</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel" id="pwrap" style="display:none">
      <div class="product-layout">
        <div class="product-media">
          <img id="pimg" class="product-img" alt="" loading="lazy" />
          <div class="small" id="pbadge"></div>
          <div class="small"><a id="plink" target="_blank" rel="noopener">Bronpagina</a></div>
        </div>

        <div class="product-main">
          <div class="product-title" id="ptitle"></div>
          <div class="product-price" id="pprice"></div>
          <div class="product-specs" id="pspecs"></div>

          <hr class="sep"/>

          <div class="panel-title">Keuzevakken</div>

          <div class="options" id="modalOptions">
  <label class="opt-disabled">
    <div class="opt-text">
      <div class="opt-title"><input id="optInstall" type="checkbox" checked="" disabled="">Levering &amp; installatie&nbsp;<div class="opt-price" style="display: inline-block;" id="optInstallPrice">€&nbsp;695,00</div></div>
    </div>
  </label>

  <label class="opt opt-disabled">
    <div class="opt-text">
      <div class="opt-title"><input type="checkbox" checked="" disabled="">Cover &amp; trap inclusief</div>
  </div></label>

  <label class="opt" id="optCoverliftRow">
  <div class="opt-text">
    <div class="opt-title"><input id="optCoverlift" type="checkbox">Coverlift € 189</div>
  </div>
</label>

<label class="opt">
  <div class="opt-text">
    <div class="opt-title"><input id="optMaint" type="checkbox">Onderhoudspakket € 179</div>
  </div>
</label>


    

  <div class="opt opt-row" id="optSwimFiltersetRow" style="display:none">
    <div class="opt-text">
      <div class="opt-title">Filterset (zwemspa)</div>
      <div class="small">€250 per set</div>
    </div>
    <div class="opt-qty">
      <input id="optSwimFiltersetQty" type="number" min="0" step="1" value="0">
    </div>
  </div>
</div>
          </div>

          <hr class="sep"/>

          <div class="product-actions">
            <div class="qty">
              <label class="small" for="pqty">Aantal</label>
              <input id="pqty" type="number" min="1" step="1" value="1" />
            </div>

            <div class="totals" style="color: white;">
              <div class="totals-row"><span>Product </span><strong id="tProduct">&nbsp;€0</strong></div>
              <div class="totals-row"><span>Opties </span><strong id="tOptions">&nbsp;€0</strong></div>
              <div class="totals-row totals-row-big"><span>Totaal </span><strong id="tTotal">&nbsp;€0</strong></div>
              <div class="small">Alle bedragen excl. btw.</div>
            </div>
          </div>

        </div>
      </div>
    </section>

    <section class="panel" id="err" style="display:none">
      <div class="panel-title">Product niet gevonden</div>
      <div class="small">Ga terug naar de catalogus en probeer opnieuw.</div>
      <div style="margin-top:12px"><a class="btn btn-secondary" href="index.html">← Terug</a></div>
    </section>
  </main>

  <script src="product.js"></script>
</body>
</html>
