<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product | Sunspa Catalogus</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .modal-grid{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:40px;
      align-items:start;
    }

    .customer-box{
      margin-top:20px;
      padding:16px;
      border:1px solid var(--border, #e5e7eb);
      border-radius:14px;
      background:#fff;
    }

    .customer-grid{
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .field-full{
      grid-column:1 / -1;
    }

    .field label{
      font-size:13px;
      font-weight:600;
      color:#374151;
    }

    .field input,
    .field select{
      width:100%;
      box-sizing:border-box;
      padding:8px 12px;
      border:1px solid #d1d5db;
      border-radius:8px;
      font-size:14px;
      outline:none;
      background:#fff;
    }

    .field select{
      max-width:146px;
      min-height:38px;
    }

    .variant-options{
      display:grid;
      grid-template-columns:minmax(180px, 260px);
      gap:12px;
    }

    .variant-options .field select{
      max-width:260px;
    }

    .field input:focus,
    .field select:focus{
      border-color:#111827;
    }

    .color-selects{
      display:grid;
      grid-template-columns:repeat(2, minmax(160px, 220px));
      gap:12px 16px;
      align-items:end;
    }

    .modal-actions{
      margin-top:20px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .img-options{
      display:flex;
      gap:20px;
      align-items:flex-start;
    }

    .options{
      flex:1 1 auto;
      min-width:0;
    }

    .modal-media img{
      margin:0;
    }

    .opt-inline .opt-title{
      gap:12px;
    }

    .opt-title > img{
      width:72px;
      height:72px;
      flex:0 0 72px;
      object-fit:cover;
      object-position:center;
      border-radius:12px;
      margin:0;
    }

    .opt-copy-stacked{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:4px;
      min-width:0;
    }

    .opt-copy-stacked small{
      color:#64748b;
      font-size:13px;
      font-weight:600;
      line-height:1.25;
    }

    @media (min-width: 981px){
      .modal-grid{
        grid-template-columns:1fr;
        gap:28px;
      }

      .img-options{
        display:grid;
        grid-template-columns:minmax(420px, 44%) minmax(480px, 1fr);
        gap:48px;
        align-items:start;
      }

      .modal-media{
        width:100%;
        align-self:start;
      }

      #productImg{
        width:100%;
        max-width:none;
        aspect-ratio:1 / 1;
        object-fit:contain;
        margin:0;
      }

      body.product-type-jacuzzi .modal-media,
      body.product-type-swimspa .modal-media{
        padding:28px;
        border:1px solid #e5e7eb;
        border-radius:24px;
        background:linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      }

      body.product-type-jacuzzi .modal-media img,
      body.product-type-swimspa .modal-media img{
        border:0;
        background:transparent;
        filter:drop-shadow(0 20px 30px rgba(15, 23, 42, 0.16));
      }

      body.product-type-jacuzzi #productImg,
      body.product-type-swimspa #productImg{
        width:112%;
        max-width:none;
        margin-left:-6%;
        aspect-ratio:auto;
      }

      .overkappingAccessoryImages,
      .overkapping-accessory-images{
        width:100%;
        max-width:none;
      }

      .options{
        width:100% !important;
        margin:0 !important;
      }

      .totals{
        max-width:760px;
      }
    }

    @media (max-width: 980px){
      .modal-grid{
        grid-template-columns:1fr;
      }

      .customer-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 700px){
      .color-selects{
        grid-template-columns:1fr;
      }

      .field select{
        max-width:100%;
      }
    }

    @media (max-width: 430px){
      .img-options{
        display:flex !important;
        flex-direction:column;
        gap:16px;
      }

      .img-options > .modal-media{
        width:100% !important;
      }

      .img-options > .options{
        margin-left:0 !important;
        width:100% !important;
      }

      .variant-options{
        grid-template-columns:1fr;
      }

      .modal-actions .btn{
        width:100%;
      }
    }

    .product-configurator{
      padding:28px;
      border-color:#dce3ea;
      border-radius:22px;
      background:#f7f9fb;
      box-shadow:0 18px 48px rgba(15, 23, 42, 0.08);
    }

    .product-configurator .modal-head{
      display:grid;
      grid-template-columns:auto minmax(0, 1fr) auto;
      align-items:center;
      gap:14px;
      padding:0 0 22px;
      border-bottom:1px solid #dce3ea;
    }

    .product-configurator .product-back{
      flex:0 0 auto;
      min-height:44px;
      padding:10px 14px;
      border-color:#dce3ea;
      border-radius:14px;
      background:#fff;
      color:#0f172a;
      font-size:16px;
      font-weight:850;
      box-shadow:0 8px 20px rgba(15, 23, 42, 0.06);
      white-space:nowrap;
    }

    .product-configurator .modal-title{
      grid-column:2;
      min-width:0;
      max-width:760px;
      font-size:clamp(28px, 2.4vw, 44px);
      line-height:1.05;
      letter-spacing:0;
    }

    .product-configurator .modal-price{
      grid-column:3;
      justify-self:end;
      padding:12px 16px;
      border:1px solid #dce3ea;
      border-radius:14px;
      background:#fff;
      box-shadow:0 10px 24px rgba(15, 23, 42, 0.06);
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      gap:6px 10px;
      max-width:100%;
      white-space:normal;
    }

    .product-configurator .modal-price .price-action-label,
    .product-configurator .modal-price .price-old,
    .product-configurator .modal-price .price-current,
    .product-configurator .modal-price .price-action-note{
      margin:0;
      white-space:nowrap;
    }

    .product-workspace{
      display:grid;
      grid-template-columns:minmax(360px, 42%) minmax(480px, 1fr);
      gap:28px;
      align-items:start;
      margin-top:28px;
    }

    .product-showcase{
      position:sticky;
      top:18px;
      display:flex;
      flex-direction:column;
      gap:18px;
      min-width:0;
    }

    .product-configurator .modal-media{
      width:100%;
      padding:22px;
      border:1px solid #dce3ea;
      border-radius:20px;
      background:#fff;
      box-shadow:0 14px 34px rgba(15, 23, 42, 0.08);
    }

    .product-image-frame{
      position:relative;
      width:100%;
    }

    .product-configurator #productImg{
      width:100%;
      max-width:none;
      aspect-ratio:1 / 1;
      object-fit:contain;
      border:0;
      border-radius:14px;
      background:#fff;
      margin:0;
    }

    .product-image-thumbs[hidden]{
      display:none !important;
    }

    .product-image-thumbs{
      display:grid;
      grid-template-columns:repeat(2, 86px);
      justify-content:center;
      gap:12px;
      margin-top:14px;
    }

    .product-thumb{
      width:86px;
      height:86px;
      padding:4px;
      border:2px solid #dce3ea;
      border-radius:12px;
      background:#fff;
      cursor:pointer;
      touch-action:manipulation;
    }

    .product-thumb.is-active{
      border-color:#1f8a5b;
      box-shadow:0 0 0 3px rgba(31, 138, 91, 0.16);
    }

    .product-thumb img{
      width:100%;
      height:100%;
      object-fit:contain;
      border-radius:8px;
      background:#fff;
      display:block;
    }

    .product-configurator .options{
      width:100% !important;
      min-width:0;
      box-sizing:border-box;
      margin:0 !important;
      gap:14px;
      padding:18px;
      border:1px solid #dce3ea;
      border-radius:20px;
      background:#fff;
      box-shadow:0 14px 34px rgba(15, 23, 42, 0.08);
    }

    @media (min-width: 641px){
      .product-configurator .options{
        height:var(--product-options-height, max(420px, calc(100vh - 190px)));
        max-height:var(--product-options-height, max(420px, calc(100vh - 190px)));
        overflow-y:auto;
        overflow-x:hidden;
        overscroll-behavior:contain;
        scrollbar-gutter:stable;
      }

      .product-configurator .options::-webkit-scrollbar{
        width:12px;
      }

      .product-configurator .options::-webkit-scrollbar-track{
        background:#eef3f7;
        border-radius:999px;
      }

      .product-configurator .options::-webkit-scrollbar-thumb{
        border:3px solid #eef3f7;
        border-radius:999px;
        background:#8ea4b8;
      }
    }

    .config-section{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:16px;
      border:1px solid #e1e7ee;
      border-radius:18px;
      background:#fbfcfd;
    }

    .config-section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      color:#0f172a;
    }

    .config-kicker{
      display:block;
      margin-bottom:2px;
      color:#5f7185;
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .config-section-title{
      display:block;
      font-size:20px;
      font-weight:900;
      line-height:1.1;
    }

    .config-note{
      color:#6b7c90;
      font-size:14px;
      font-weight:700;
      text-align:right;
    }

    .product-configurator .color-selects,
    .product-configurator .variant-options{
      width:100%;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    .product-configurator .field label{
      color:#334155;
      font-size:13px;
    }

    .product-configurator .field select,
    .product-configurator .field input{
      max-width:none;
      min-height:52px;
      border-color:#d8e0e8;
      border-radius:12px;
      color:#0f172a;
      font-size:16px;
      font-weight:750;
      box-shadow:0 1px 0 rgba(15, 23, 42, 0.03);
    }

    .product-configurator .color-field{
      width:100%;
      min-width:0;
      flex:1 1 0;
    }

    .product-configurator .color-field label{
      display:block;
      margin-bottom:6px;
      color:#5f7185;
      font-size:12px;
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .product-configurator .color-select-card{
      display:grid;
      grid-template-columns:30px minmax(0, 1fr);
      align-items:center;
      gap:7px;
      min-height:54px;
      padding:7px;
      border:1px solid #dbe3ec;
      border-radius:14px;
      background:#fff;
      box-shadow:0 1px 0 rgba(15, 23, 42, 0.03);
    }

    .product-configurator .color-swatch{
      width:30px;
      height:30px;
      border:1px solid rgba(15, 23, 42, 0.14);
      border-radius:999px;
      background:#e5e7eb;
      box-shadow:inset 0 1px 2px rgba(255,255,255,.6), 0 3px 10px rgba(15,23,42,.08);
    }

    .product-configurator .color-select-card select{
      width:100%;
      min-width:0;
      min-height:40px;
      padding:4px 20px 4px 0;
      border:0;
      background:transparent;
      box-shadow:none;
      font-size:14px;
      font-weight:700;
      line-height:1.2;
      text-transform:capitalize;
    }

    .product-configurator .color-select-card:focus-within{
      border-color:#2f6f9f;
      box-shadow:0 0 0 3px rgba(47, 111, 159, 0.12);
    }

    .product-configurator .opt,
    .product-configurator label.opt,
    .product-configurator .opt-disabled{
      width:100%;
      min-height:76px;
      margin:0;
      padding:10px;
      border:1px solid #dbe3ec;
      border-radius:16px;
      background:#fff;
      box-shadow:0 1px 0 rgba(15, 23, 42, 0.03);
      transition:border-color .16s ease, box-shadow .16s ease, background-color .16s ease, transform .16s ease;
    }

    .product-configurator .opt:hover,
    .product-configurator label.opt:hover{
      border-color:#9db3c8;
      background:#f8fbfd;
      box-shadow:0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .product-configurator .opt:has(input:checked),
    .product-configurator label.opt:has(input:checked),
    .product-configurator .opt-disabled:has(input:checked),
    .product-configurator .opt.is-active{
      border-color:#2f6f9f;
      background:#f0f8fc;
      box-shadow:0 0 0 3px rgba(47, 111, 159, 0.12);
    }

    .product-configurator .opt-title,
    .product-configurator label.opt .opt-title{
      width:100%;
      min-width:0;
      gap:12px;
      color:#0f172a;
    }

    .product-configurator .opt-title > img{
      width:70px;
      height:70px;
      flex:0 0 70px;
      border-radius:12px;
      object-fit:cover;
      border:1px solid #e5eaf0;
      background:#f8fafc;
    }

    .product-configurator input[type="checkbox"],
    .product-configurator input[type="radio"]{
      width:24px;
      height:24px;
      flex:0 0 24px;
      accent-color:#2f6f9f;
      cursor:pointer;
    }

    .product-configurator .opt-copy{
      display:flex;
      min-width:0;
      flex:1 1 auto;
      align-items:center;
      gap:10px;
    }

    .product-configurator .opt-label{
      display:block;
      min-width:0;
      color:#0f172a;
      font-size:17px;
      font-weight:900;
    }

    .product-configurator .opt-copy > span:first-child{
      min-width:0;
    }

    .product-configurator .opt-price{
      margin-left:auto;
      padding:6px 10px;
      border-radius:999px;
      background:#eef6f2;
      color:#1f6d45;
      font-size:15px;
      font-weight:900;
      white-space:nowrap;
    }

    .product-configurator .opt-note{
      display:block;
      margin-top:4px;
      color:#62748a;
      font-size:13px;
      font-weight:750;
      line-height:1.25;
    }

    #optInstallRow .opt-copy,
    #optCoverliftRow .opt-copy,
    #optCoverlift2Row .opt-copy,
    #optMaintRow .opt-copy,
    #optSwimFiltersetRow .opt-copy{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      align-items:center;
      width:100%;
      gap:6px 12px;
    }

    #optInstallRow .opt-label,
    #optCoverliftRow .opt-label,
    #optCoverlift2Row .opt-label,
    #optMaintRow .opt-label,
    #optSwimFiltersetRow .opt-label{
      line-height:1.15;
      overflow-wrap:normal;
    }

    #optInstallRow .opt-price,
    #optCoverliftRow .opt-price,
    #optCoverlift2Row .opt-price,
    #optMaintRow .opt-price,
    #optSwimFiltersetRow .opt-price{
      justify-self:end;
      margin-left:0;
    }

    #optBarrelStoveGroup,
    #optBarrelRoofGroup{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    #optBarrelRoofGroup .barrel-option-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }

    #optBarrelStoveGroup .barrel-option-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    #optBarrelStoveGroup label.opt,
    #optBarrelRoofGroup label.opt{
      min-height:132px;
      align-items:stretch;
    }

    #optBarrelStoveGroup .opt-title,
    #optBarrelRoofGroup .opt-title{
      display:grid;
      grid-template-columns:auto 78px minmax(0, 1fr);
      align-items:center;
    }

    #optBarrelRoofGroup .opt-title{
      grid-template-columns:auto minmax(0, 1fr);
      grid-template-rows:auto auto;
    }

    #optBarrelRoofGroup .opt-title > img{
      grid-column:1 / -1;
      width:100%;
      height:112px;
    }

    #optBarrelRoofGroup .opt-title > input{
      grid-column:1;
      grid-row:2;
    }

    #optBarrelRoofGroup .opt-title > .opt-copy{
      grid-column:2;
      grid-row:2;
      flex-direction:column;
      align-items:flex-start;
      gap:6px;
    }

    #optBarrelRoofGroup .opt-title .opt-price{
      margin-left:0;
    }

    #optBarrelInfraredModuleRow .opt-title{
      display:grid !important;
      grid-template-columns:70px minmax(0, 1fr);
      align-items:center;
      gap:10px 12px;
    }

    #optBarrelInfraredModuleRow{
      min-height:132px;
      align-items:stretch;
    }

    #optBarrelInfraredModuleRow .opt-text{
      align-items:center;
    }

    #optBarrelInfraredModuleRow .opt-title > img{
      grid-column:1;
      grid-row:1 / span 2;
    }

    #optBarrelInfraredModuleRow .opt-copy{
      grid-column:2;
      grid-row:1;
      align-self:end;
    }

    #optBarrelInfraredModuleRow .opt-counter{
      grid-column:2;
      grid-row:2;
      justify-self:end;
      align-self:start;
    }

    .totals{
      order:-1;
      width:100%;
      max-width:none !important;
      margin:0 !important;
      padding:18px;
      border:1px solid #cfdbe6;
      border-radius:20px;
      background:#0f172a;
      color:#fff;
      box-shadow:0 16px 36px rgba(15, 23, 42, 0.18);
    }

    .totals-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      padding:7px 0;
      color:#dce7f2;
      font-size:18px;
    }

    .totals-row strong{
      color:#fff;
      white-space:nowrap;
    }

    .totals-row-big{
      margin-top:8px;
      padding-top:14px;
      border-top:1px solid rgba(255, 255, 255, .18);
      color:#fff;
      font-size:26px;
      font-weight:900;
    }

    .totals .small{
      margin-top:6px;
      color:#a9b8c8;
    }

    .totals .modal-actions{
      margin-top:16px;
    }

    .totals .btn{
      border-color:transparent;
      color:#fff;
      box-shadow:0 10px 22px rgba(0, 0, 0, .18);
    }

    .totals .btn-secondary{
      background:#16a34a;
    }

    .totals .btn-primary{
      background:#0ea5e9;
    }

    .totals .btn:hover{
      filter:brightness(1.06);
      border-color:rgba(255,255,255,.4);
    }

    .product-specs-panel{
      margin-top:28px;
      padding:18px;
      border:1px solid #dce3ea;
      border-radius:20px;
      background:#fff;
      box-shadow:0 12px 30px rgba(15, 23, 42, 0.06);
    }

    .product-specs-panel .panel-title{
      color:#0f172a;
    }

    .product-specs-panel .spec-row{
      border-color:#dce3ea;
      background:#f9fbfd;
    }

    @media (min-width: 1500px){
      .product-workspace{
        grid-template-columns:minmax(480px, 40%) minmax(720px, 1fr);
        gap:36px;
      }

      .product-configurator .options{
        padding:22px;
      }
    }

    @media (max-width: 1499px){
      .product-workspace{
        grid-template-columns:minmax(330px, 45%) minmax(0, 1fr);
        gap:20px;
      }

      #optBarrelStoveGroup .barrel-option-grid,
      #optBarrelRoofGroup .barrel-option-grid{
        grid-template-columns:1fr;
      }

      #optBarrelStoveGroup .opt-title,
      #optBarrelRoofGroup .opt-title{
        grid-template-columns:auto 76px minmax(0, 1fr);
        grid-template-rows:auto;
      }

      #optBarrelStoveGroup .opt-title > img,
      #optBarrelRoofGroup .opt-title > img{
        grid-column:2;
        width:76px;
        height:76px;
      }

      #optBarrelStoveGroup .opt-title > input,
      #optBarrelRoofGroup .opt-title > input{
        grid-column:1;
        grid-row:1;
      }

      #optBarrelStoveGroup .opt-title > .opt-copy,
      #optBarrelRoofGroup .opt-title > .opt-copy{
        grid-column:3;
        grid-row:1;
        flex-direction:row;
        align-items:center;
      }

      #optBarrelStoveGroup .opt-title .opt-price,
      #optBarrelRoofGroup .opt-title .opt-price{
        margin-left:auto;
      }
    }

    @media (min-width: 641px) and (max-width: 900px){
      .product-configurator{
        padding:18px;
      }

      .product-configurator .modal-head{
        grid-template-columns:auto minmax(0, 1fr);
      }

      .product-configurator .modal-title{
        grid-column:1 / -1;
        grid-row:2;
        max-width:none;
      }

      .product-configurator .modal-price{
        grid-column:2;
        grid-row:1;
      }

      .product-workspace{
        grid-template-columns:minmax(260px, 40%) minmax(0, 1fr);
        gap:14px;
      }

      .product-configurator .modal-media,
      .product-configurator .options{
        padding:14px;
      }
    }

    @media (max-width: 640px){
      .product-configurator{
        padding:18px;
      }

      .product-configurator .modal-head{
        align-items:flex-start;
        grid-template-columns:1fr;
      }

      .product-configurator .product-back{
        grid-column:1;
        grid-row:1;
      }

      .product-configurator .modal-title{
        grid-column:1;
        grid-row:2;
        max-width:none;
      }

      .product-configurator .modal-price{
        grid-column:1;
        grid-row:3;
        justify-self:start;
        justify-content:flex-start;
      }

      .product-workspace{
        grid-template-columns:1fr;
      }

      .product-showcase{
        position:static;
      }

      .product-configurator .modal-media{
        padding:14px;
      }
    }

    @media (min-width: 641px) and (max-height: 900px){
      .product-configurator{
        padding:22px 28px;
      }

      .product-configurator .modal-head{
        padding-bottom:16px;
      }

      .product-workspace{
        margin-top:18px;
      }

      .product-configurator .modal-media{
        padding:14px;
      }

      .product-configurator #productImg{
        width:100%;
        height:min(34vh, 330px);
        aspect-ratio:auto;
        object-fit:contain;
      }
    }

    @media (max-width: 640px){
      .product-configurator .color-selects,
      .product-configurator .variant-options,
      #optBarrelStoveGroup .barrel-option-grid,
      #optBarrelRoofGroup .barrel-option-grid{
        grid-template-columns:1fr;
      }

      .config-section-head{
        align-items:flex-start;
        flex-direction:column;
      }

      .config-note{
        text-align:left;
      }

      .product-configurator .opt-title,
      #optBarrelStoveGroup .opt-title,
      #optBarrelRoofGroup .opt-title{
        grid-template-columns:auto 64px minmax(0, 1fr);
      }

      .product-configurator .opt-title > img,
      #optBarrelRoofGroup .opt-title > img{
        width:64px;
        height:64px;
        grid-column:2;
      }

      .product-configurator .opt-copy{
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
      }

      .product-configurator .opt-price,
      #optBarrelRoofGroup .opt-title .opt-price{
        margin-left:0;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel" id="errorBox" style="display:none">
      <div class="panel-title">Fout</div>
      <div class="small" id="errorText"></div>
    </section>

    <section class="panel product-configurator" id="productPage" style="display:none">
      <div class="modal-head" style="margin-bottom:20px">
        <a id="backToOverview" class="btn product-back" href="index.html">&larr; Terug naar overzicht</a>
        <h1 id="productTitle" class="modal-title">—</h1>
        <div id="productPrice" class="modal-price">Prijs: —</div>
      </div>

      <div class="product-workspace">
        <aside class="product-showcase">
            <div class="modal-media">
              <div class="product-image-frame">
                <img id="productImg" alt="Barrelsauna TR170 – Halfglas" loading="lazy" src="https://www.sunspabenelux.be/wp-content/uploads/2022/11/barrelsauna-tr170-half-glas-650x650.jpg">
              </div>
              <div id="productImageThumbs" class="product-image-thumbs" hidden></div>
              <div id="overkappingAccessoryImages" class="overkapping-accessory-images" style="display:none;"></div>
            </div>

            <div class="totals" style="font-size:22px; margin-top:20px;">
              <div class="totals-row"><span>Product </span><strong id="optProductTotal">€&nbsp;4.195,00</strong></div>
              <div class="totals-row"><span>Opties </span><strong id="optOptionsTotal">€&nbsp;995,00</strong></div>
              <div class="totals-row totals-row-big"><span>Totaal </span><strong id="optGrandTotal">€&nbsp;5.190,00</strong></div>
              <div class="small">Alle bedragen incl. btw &amp; excl. kraankosten.</div>

              <div class="modal-actions">
                <button id="offerPrint" class="btn btn-primary" type="button">Print offerte</button>
              </div>
            </div>
        </aside>

        <section class="options" aria-label="Product configuratie">
              <div class="config-section" id="configBaseSection">
                <div class="config-section-head">
                  <div>
                    <span class="config-kicker">Stap 1</span>
                    <span class="config-section-title">Basis</span>
                  </div>
                  <span class="config-note">Vaste onderdelen</span>
                </div>

              <div class="color-selects">
                <div class="field color-field">
                  <label for="spaInnerColor">Binnenkleur</label>
                  <div class="color-select-card">
                    <span id="spaInnerColorSwatch" class="color-swatch" aria-hidden="true"></span>
                    <select id="spaInnerColor">
                      <option value="silver marble">silver marble</option>
                      <option value="black marble">black marble</option>
                      <option value="pure white">pure white</option>
                    </select>
                  </div>
                </div>

                <div class="field color-field">
                  <label for="spaCabinetColor">Omkastingkleur</label>
                  <div class="color-select-card">
                    <span id="spaCabinetColorSwatch" class="color-swatch" aria-hidden="true"></span>
                    <select id="spaCabinetColor"></select>
                  </div>
                </div>
              </div>

              <div id="variantOptions" class="variant-options" style="display:none;">
                <div class="field">
                  <label id="variantLabel" for="productVariant">Afmeting</label>
                  <select id="productVariant"></select>
                </div>
              </div>

              <label class="opt-disabled opt-inline" id="optInstallRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optInstall" type="checkbox" checked disabled />
                    <span class="opt-copy">
                      <span class="opt-label">Levering & installatie</span>
                      <span class="opt-price" id="optInstallPrice">€0</span>
                    </span>
                  </div>
                </div>
              </label>
              </div>

              <div id="overkappingScreensGroup" class="overkapping-screens" style="display:none;"></div>

              <label class="opt opt-disabled opt-inline" id="optCoverTrapRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input type="checkbox" checked disabled />
                    <span class="opt-copy">
                      <span class="opt-label">Cover & trap inclusief</span>
                    </span>
                  </div>
                </div>
              </label>

              <label class="opt opt-inline" id="optCoverliftRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <img src="images/Coverlift.jpg" alt="Coverlift beugel"/>
                    <input id="optCoverlift" type="checkbox" />
                    <span class="opt-copy">
                      <span>
                        <span class="opt-label">Coverlift</span>
                        <span class="opt-note">+ 50 cm aan één kant spa</span>
                      </span>
                      <span class="opt-price">€ 189</span>
                    </span>
                  </div>
                </div>
              </label>

              <label class="opt opt-inline" id="optCoverlift2Row" style="display:none">
                <div class="opt-text">
                  <div class="opt-title">
                    <img src="images/Coverlift.jpg" alt="Coverlift beugel"/>
                    <input id="optCoverlift2" type="checkbox" />
                    <span class="opt-copy">
                      <span class="opt-label">2e Coverlift</span>
                      <span class="opt-price">€ 189</span>
                    </span>
                  </div>
                </div>
              </label>

              <label class="opt opt-inline" id="optMaintRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <img src="images/Onderhoudspakket.webp" alt="Onderhoudspakket"/>
                    <input id="optMaint" type="checkbox" />
                    <span class="opt-copy">
                      <span class="opt-label">Onderhouds<br>pakket</span>
                      <span class="opt-price">€ 179</span>
                    </span>
                  </div>
                </div>
              </label>

              <label class="opt opt-inline" id="optSwimFiltersetRow" style="display:none">
                <div class="opt-text">
                  <div class="opt-title">
                    <img src="images/FiltersetZwemspa.jpg" alt="Onderhoudspakket"/>
                    <input id="optSwimFilterset" type="checkbox" />
                    <span class="opt-copy">
                      <span class="opt-label">Filterset (zwemspa)</span>
                      <span class="opt-price">€ 250</span>
                    </span>
                  </div>
                </div>
              </label>

              <label class="opt opt-inline" id="optWarmtepompRow" style="display:none">
                <div class="opt-text" style="width:100%;">
                  <div class="opt-title" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                    <span style="margin-left: 9px;margin-top: 5px;">Warmtepomp incl. afstelling* € 2795</span>

                    <div class="opt-counter">
                      <img src="images/warmtepomp.jpg" alt="Warmtepomp"/>
                      <button id="optWarmtepompMinus" type="button" class="opt-counter-btn">−</button>
                      <input
                        id="optWarmtepompQty"
                        type="number"
                        min="0"
                        step="1"
                        value="0"
                        inputmode="numeric"
                        class="opt-counter-input"
                      />
                      <button id="optWarmtepompPlus" type="button" class="opt-counter-btn">+</button>
                    </div>
                  </div>
                </div>
              </label>

              <div id="optBarrelStoveGroup" class="config-section" style="display:none">
                <div class="config-section-head">
                  <div>
                    <span class="config-kicker">Stap 2</span>
                    <span class="config-section-title">Verwarming</span>
                  </div>
                  <span class="config-note">Kacheloptie</span>
                </div>

                <div class="barrel-option-grid">
                <label class="opt opt-inline" id="optBarrelWoodStoveRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelWoodStove" name="barrelStove" type="radio" value="wood" />
                      <img src="images/houtkachel.webp" alt="houtkachel" />
                      <span class="opt-copy">
                        <span class="opt-label">Houtkachel + rookafvoer</span>
                        <span class="opt-price">€ 1245</span>
                      </span>
                    </div>
                  </div>
                </label>

                <label class="opt opt-inline" id="optBarrelElectricHeaterRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelElectricHeater" name="barrelStove" type="radio" value="electric" />
                      <img src="images/elektrische kachel.jpg" alt="shingles" />
                      <span class="opt-copy">
                        <span>
                          <span class="opt-label">Harvia 8 kW</span>
                          <span class="opt-note">Incl. stenen &amp; montage</span>
                        </span>
                        <span class="opt-price">€ 495</span>
                      </span>
                    </div>
                  </div>
                </label>

                <label class="opt opt-inline" id="optBarrelHuumDropRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelHuumDrop" name="barrelStove" type="radio" value="huum-drop" />
                      <img src="images/huum-drop-barrel.jpg" alt="HUUM Drop 9 kW" />
                      <span class="opt-copy">
                        <span>
                          <span class="opt-label">HUUM Drop 9 kW</span>
                          <span class="opt-note">Incl. WiFi module en bediening + stenen &amp; safety rail.</span>
                        </span>
                        <span class="opt-price">€ 1.595</span>
                      </span>
                    </div>
                  </div>
                </label>

                <label class="opt opt-inline" id="optBarrelHarviaCilinderRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelHarviaCilinder" name="barrelStove" type="radio" value="harvia-cilinder" />
                      <img src="images/Harvia-Kachel.jpg" alt="Harvia Cilinder 9 kW" />
                      <span class="opt-copy">
                        <span>
                          <span class="opt-label">Harvia Cilinder 9 kW</span>
                          <span class="opt-note">Incl. stenen &amp; montage</span>
                        </span>
                        <span class="opt-price">€ 599</span>
                      </span>
                    </div>
                  </div>
                </label>
                </div>
              </div>

              <div id="optBarrelRoofGroup" class="config-section" style="display:none">
                <div class="config-section-head">
                  <div>
                    <span class="config-kicker">Stap 3</span>
                    <span class="config-section-title">Dakafwerking</span>
                  </div>
                  <span class="config-note">Afwerking buitenzijde</span>
                </div>

                <div class="barrel-option-grid">
                <label class="opt opt-inline" id="optBarrelRoofShinglesRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelRoofShingles" name="barrelRoof" type="radio" value="shingles" />
                      <img src="images/dakshingles.jpg" alt="shingles" />
                      <span class="opt-copy">
                        <span class="opt-label">Shingles dak</span>
                        <span class="opt-price">€ 399</span>
                      </span>
                    </div>
                  </div>
                </label>

                <label class="opt opt-inline" id="optBarrelRoofHeatherRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelRoofHeather" name="barrelRoof" type="radio" value="heather" />
                      <img src="images/heide.jpg" alt="heidedak" />
                      <span class="opt-copy">
                        <span class="opt-label">Heidedak</span>
                        <span class="opt-price">€ 849</span>
                      </span>
                    </div>
                  </div>
                </label>

                <label class="opt opt-inline" id="optBarrelRoofDesignRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelRoofDesign" name="barrelRoof" type="radio" value="design" />
                      <img src="images/cedar latjes.jpg" alt="design dak" />
                      <span class="opt-copy">
                        <span class="opt-label">Design dak</span>
                        <span class="opt-price">€ 899</span>
                      </span>
                    </div>
                  </div>
                </label>
                </div>
              </div>

              <div class="opt opt-inline" id="optBarrelInfraredModuleRow" style="display:none">
                <div class="opt-text" style="width:100%;">
                  <div class="opt-title" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                    <img src="images/Infrarood-Backrest-Heater-Set-voor-Barrelsauna.jpg" alt="Infrarood module" />
                    <span class="opt-copy">
                      <span class="opt-label">Infrarood module</span>
                      <span class="opt-price">€ 699</span>
                    </span>
                    <div class="opt-counter">
                      <button id="optBarrelInfraredModuleMinus" type="button" class="opt-counter-btn">−</button>
                      <input
                        id="optBarrelInfraredModuleQty"
                        type="number"
                        min="0"
                        step="1"
                        value="0"
                        inputmode="numeric"
                        class="opt-counter-input"
                        aria-label="Aantal infrarood modules"
                      />
                      <button id="optBarrelInfraredModulePlus" type="button" class="opt-counter-btn">+</button>
                    </div>
                  </div>
                </div>
              </div>
        </section>
      </div>

          <div class="product-specs-panel">
            <div class="panel-title" style="margin-bottom:10px;">Specificaties</div>
            <div id="productSpecs" class="spec-table"></div>
          </div>
    </section>
  </main>

  <script src="product.js"></script>
</body>
</html>
