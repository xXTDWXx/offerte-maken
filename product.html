<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product | Sunspa Catalogus</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .modal-grid{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:40px;
      align-items:start;
    }

    .customer-box{
      margin-top:20px;
      padding:16px;
      border:1px solid var(--border, #e5e7eb);
      border-radius:14px;
      background:#fff;
    }

    .customer-grid{
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field-full{
      grid-column:1 / -1;
    }

    .field label{
      font-size:14px;
      font-weight:600;
      color:#374151;
    }

    .field input{
      width:100%;
      box-sizing:border-box;
      padding:12px 14px;
      border:1px solid #d1d5db;
      border-radius:10px;
      font-size:15px;
      outline:none;
      background:#fff;
    }

    .field input:focus{
      border-color:#111827;
    }

    .modal-actions{
      margin-top:20px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    @media (max-width: 980px){
      .modal-grid{
        grid-template-columns:1fr;
      }

      .customer-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">Sunspa Catalogus</div>
      </div>
      <a class="btn" href="index.html">← Terug naar overzicht</a>
    </div>
  </header>

  <main class="container">
    <section class="panel" id="errorBox" style="display:none">
      <div class="panel-title">Fout</div>
      <div class="small" id="errorText"></div>
    </section>

    <section class="panel" id="productPage" style="display:none">
      <div class="modal-head" style="margin-bottom:20px">
        <h1 id="productTitle" class="modal-title">—</h1>
        <div id="productPrice" class="modal-price">Prijs: —</div>
      </div>

      <div class="modal-grid">
        <div>
          <div class="img-options" style="display:flex;">
          <div class="modal-media">
            <img id="productImg" alt="" loading="lazy" />
          </div>


          <div class="options">
            <label class="opt-disabled opt-inline">
              <div class="opt-text">
                <div class="opt-title">
                  <input id="optInstall" type="checkbox" checked disabled />
                  Levering & installatie
                  <span class="opt-price" id="optInstallPrice">€0</span>
                </div>
              </div>
            </label>

            <label class="opt opt-disabled opt-inline" id="optCoverTrapRow">
              <div class="opt-text">
                <div class="opt-title">
                  <input type="checkbox" checked disabled />
                  Cover & trap inclusief
                </div>
              </div>
              <div class="opt-price" style="visibility:hidden;">€0</div>
            </label>

            <label class="opt opt-inline" id="optCoverliftRow">
              <div class="opt-text">
                <div class="opt-title">
                  <input id="optCoverlift" type="checkbox" />
                  Coverlift € 189
                </div>
              </div>
              <div class="opt-price" id="optCoverliftTotal" style="visibility:hidden;">€0</div>
            </label>

            <label class="opt opt-inline" id="optCoverlift2Row" style="display:none">
              <div class="opt-text">
                <div class="opt-title">
                  <input id="optCoverlift2" type="checkbox" />
                  2e Coverlift € 189
                </div>
              </div>
              <div class="opt-price" id="optCoverlift2Total" style="visibility:hidden;">€0</div>
            </label>

            <label class="opt opt-inline" id="optMaintRow">
              <div class="opt-text">
                <div class="opt-title">
                  <input id="optMaint" type="checkbox" />
                  Onderhoudspakket € 179
                </div>
              </div>
              <div class="opt-price" id="optMaintTotal" style="visibility:hidden;">€0</div>
            </label>

            <label class="opt opt-inline" id="optSwimFiltersetRow" style="display:none">
              <div class="opt-text">
                <div class="opt-title">
                  <input id="optSwimFilterset" type="checkbox" />
                  Filterset (zwemspa) € 250
                </div>
              </div>
              <div class="opt-price" id="optSwimFiltersetTotal" style="visibility:hidden;">€0</div>
            </label>

            <!-- <label class="opt" id="optWarmtepomp">
              <div class="opt-text">
                <div class="opt-title">
                  <input id="optWarmtepomp" type="checkbox" />
                  Warmtepomp incl. afstelling* € 2795
                </div>
              </div>
              <div class="opt-price" id="optSwimFiltersetTotal" style="visibility:hidden;">€0</div>
            </label> -->

            <div id="optBarrelStoveGroup" style="display:none">
              <label class="opt opt-inline" id="optBarrelWoodStoveRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optBarrelWoodStove" name="barrelStove" type="radio" value="wood" />
                    <img src="houtkachel.webp" alt="houtkachel" />
                    Houtkachel + rookafvoer € 1245
                  </div>
                </div>
                <div class="opt-price" id="optBarrelWoodStoveTotal" style="visibility:hidden;">€0</div>
              </label>

              <label class="opt opt-inline" id="optBarrelElectricHeaterRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optBarrelElectricHeater" name="barrelStove" type="radio" value="electric" />
                    <img src="elektrische kachel.jpg" alt="shingles" />
                    Elektrische kachel 8 kW € 495
                  </div>
                </div>
                <div class="opt-price" id="optBarrelElectricHeaterTotal" style="visibility:hidden;">€0</div>
              </label>
            </div>

            <div id="optBarrelRoofGroup" style="display:none">
              <label class="opt opt-inline" id="optBarrelRoofShinglesRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optBarrelRoofShingles" name="barrelRoof" type="radio" value="shingles" />
                    <img src="dakshingles.jpg" alt="shingles" />
                    Shingles dak € 399
                  </div>
                </div>
                <div class="opt-price" id="optBarrelRoofShinglesTotal" style="visibility:hidden;">€0</div>
              </label>

              <label class="opt opt-inline" id="optBarrelRoofHeatherRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optBarrelRoofHeather" name="barrelRoof" type="radio" value="heather" />
                    <img src="heide.jpg" alt="heidedak" />
                    Heidedak € 849
                  </div>
                </div>
                <div class="opt-price" id="optBarrelRoofHeatherTotal" style="visibility:hidden;">€0</div>
              </label>

              <label class="opt opt-inline" id="optBarrelRoofDesignRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optBarrelRoofDesign" name="barrelRoof" type="radio" value="design" />
                    <img src="cedar latjes.jpg" alt="design dak" />
                    Design dak € 899
                  </div>
                </div>
                <div class="opt-price" id="optBarrelRoofDesignTotal" style="visibility:hidden;">€0</div>
              </label>
            </div>
          </div>

          <label class="opt opt-inline" id="optBarrelInfraredModuleRow" style="display:none">
  <input id="optBarrelInfraredModule" type="checkbox" />
  <div class="opt-text">
    <div class="opt-title">Infrarood module € 699</div>
  </div>
  <div class="opt-price" id="optBarrelInfraredModuleTotal" style="visibility:hidden;">€0</div>
</label>
          </div>

          <hr style="border:none;border-top:1px solid var(--border);margin:20px 0" />

          <div class="totals" style="font-size:22px">
            <div class="totals-row"><span>Product </span><strong id="optProductTotal">€0</strong></div>
            <div class="totals-row"><span>Opties </span><strong id="optOptionsTotal">€0</strong></div>
            <div class="totals-row totals-row-big"><span>Totaal </span><strong id="optGrandTotal">€0</strong></div>
            <div class="small">Alle bedragen incl. btw & excl. kraankosten.</div>
          </div>

          <!-- <div class="customer-box">
            <div class="panel-title" style="margin-bottom:4px;">Klantgegevens</div>
            <div class="small">Deze gegevens komen automatisch op de offerte.</div>

            <div class="customer-grid">
              <div class="field">
                <label for="customerName">Naam</label>
                <input id="customerName" type="text" placeholder="Naam klant" />
              </div>

              <div class="field">
                <label for="customerPhone">Gsm</label>
                <input id="customerPhone" type="text" placeholder="+32 ..." />
              </div>

              <div class="field field-full">
                <label for="customerStreet">Straat</label>
                <input id="customerStreet" type="text" placeholder="Straat + huisnummer" />
              </div>

              <div class="field field-full">
                <label for="customerCity">Gemeente</label>
                <input id="customerCity" type="text" placeholder="Postcode + gemeente" />
              </div>
            </div>
          </div> -->

          <div class="modal-actions">
            <a id="productUrl" class="btn btn-secondary" target="_blank" rel="noopener">Bekijk op website</a>
            <!-- <button id="productPrint" class="btn btn-secondary" type="button">Print productfiche</button> -->
            <button id="offerPrint" class="btn btn-primary" type="button">Print offerte</button>
          </div>
        </div>

        <div>
          <div class="panel-title" style="margin-bottom:10px;">Specificaties</div>
          <div id="productSpecs" class="spec-table"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="product.js"></script>
</body>
</html>
