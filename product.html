<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Product | Sunspa Catalogus</title>
<link rel="stylesheet" href="styles.css" />

<style>

/* layout foto + rechterkant */
.modal-grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:40px;
}

/* layout opties + specs */
.right-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  align-items:start;
}

</style>
</head>

<body>

<header class="header">
<div class="container header-row">
<div class="brand">
<div class="brand-title">Sunspa Catalogus</div>
</div>
<a class="btn" href="index.html">← Terug naar overzicht</a>
</div>
</header>

<main class="container">

<section class="panel" id="errorBox" style="display:none">
<div class="panel-title">Fout</div>
<div class="small" id="errorText"></div>
</section>

<section class="panel" id="productPage" style="display:none">

<div class="modal-head" style="margin-bottom:20px">
<h1 id="productTitle" class="modal-title">—</h1>
<div id="productPrice" class="modal-price">Prijs: —</div>
</div>

<div class="modal-grid">

<!-- FOTO -->
<div class="modal-media">
<img id="productImg" alt="" loading="lazy" />
<div id="productType" class="modal-type"></div>
</div>


<!-- RECHTERKANT -->
<div>

<div class="panel-title" style="margin-bottom:15px;">Opties</div>

<div class="right-grid">

<!-- OPTIES -->
<div>

<div class="options">

<label class="opt-disabled">
<div class="opt-text">
<div class="opt-title">
<input id="optInstall" type="checkbox" checked disabled />
Levering & installatie
<span class="opt-price" id="optInstallPrice">€0</span>
</div>
</div>
</label>

<label class="opt opt-disabled" id="optCoverTrapRow">
<div class="opt-text">
<div class="opt-title">
<input type="checkbox" checked disabled />
Cover & trap inclusief
</div>
</div>
</label>

<label class="opt" id="optCoverliftRow">
<div class="opt-text">
<div class="opt-title">
<input id="optCoverlift" type="checkbox" />
Coverlift €189
</div>
</div>
</label>

<label class="opt" id="optCoverlift2Row" style="display:none">
<div class="opt-text">
<div class="opt-title">
<input id="optCoverlift2" type="checkbox" />
2e Coverlift €189
</div>
</div>
</label>

<label class="opt" id="optMaintRow">
<div class="opt-text">
<div class="opt-title">
<input id="optMaint" type="checkbox" />
Onderhoudspakket €179
</div>
</div>
</label>

<label class="opt" id="optSwimFiltersetRow" style="display:none">
<div class="opt-text">
<div class="opt-title">
<input id="optSwimFilterset" type="checkbox" />
Filterset (zwemspa) €250
</div>
</div>
</label>

</div>


<!-- TOTALEN -->
<hr style="margin:20px 0;border:none;border-top:1px solid var(--border)">

<div class="totals">

<div class="totals-row">
<span>Product</span>
<strong id="optProductTotal">€0</strong>
</div>

<div class="totals-row">
<span>Opties</span>
<strong id="optOptionsTotal">€0</strong>
</div>

<div class="totals-row totals-row-big">
<span>Totaal</span>
<strong id="optGrandTotal">€0</strong>
</div>

<div class="small">
Alle bedragen incl. btw & excl. kraankosten.
</div>

</div>

</div>


<!-- SPECS -->
<div>

<div class="panel-title" style="margin-bottom:15px;">
Specificaties
</div>

<div id="productSpecs" class="spec-table"></div>

</div>


</div>


<div style="margin-top:25px" class="modal-actions">
<a id="productUrl" class="btn btn-secondary" target="_blank">Bekijk op website</a>
<button id="productPrint" class="btn btn-primary">Print</button>
</div>

</div>

</div>

</section>

</main>

<script src="product.js"></script>

</body>
</html>
