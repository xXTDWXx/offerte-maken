<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offerte</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">Offerte</div>
        <div class="brand-sub">Overzicht van gekozen producten en opties.</div>
      </div>

      <div class="header-actions">
        <a class="btn btn-secondary" href="index.html">← Terug naar catalogus</a>
        <button id="btnPrint" class="btn btn-primary" type="button">🖨️ Print / PDF</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="panel-row">
        <div class="field">
          <label for="custName">Klantnaam</label>
          <input id="custName" type="text" placeholder="Voornaam + naam" />
        </div>
        <div class="field">
          <label for="custEmail">E-mail</label>
          <input id="custEmail" type="email" placeholder="naam@domein.be" />
        </div>
        <div class="field">
          <label for="custPhone">Telefoon</label>
          <input id="custPhone" type="tel" placeholder="+32…" />
        </div>
        <div class="field">
          <label for="custCity">Gemeente</label>
          <input id="custCity" type="text" placeholder="Bijv. Gent" />
        </div>
      </div>
      <div class="panel-row">
        <div class="field field-wide">
          <label for="notes">Opmerkingen / voorwaarden</label>
          <textarea id="notes" rows="3" placeholder="Bijv. levering inbegrepen, toegang tot tuin, kraan nodig…"></textarea>
        </div>
      </div>
      <div class="panel-row">
        <button id="btnReset" class="btn btn-danger" type="button">Winkelwagen leegmaken</button>
        <button id="btnCopy" class="btn btn-secondary" type="button">📋 Kopieer tekst</button>
        <button id="btnDownload" class="btn btn-secondary" type="button">⬇️ Download JSON</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">Regels</div>
      <div id="lines"></div>

      <div class="panel-row panel-row-2" style="margin-top:10px">
        <div class="small" id="emptyHint"></div>
        <div class="totals">
          <div class="totals-row"><span>Subtotaal</span><strong id="subTotal">€0</strong></div>
          <div class="totals-row totals-row-big"><span>Totaal (excl. btw)</span><strong id="grandTotal">€0</strong></div>
        </div>
      </div>
    </section>

    <section class="panel print-only">
      <div class="panel-title">Offerte</div>
      <div id="printBlock"></div>
    </section>
  </main>

  <template id="lineTpl">
    <div class="cart-row">
      <div class="cart-main">
        <div class="cart-title" data-title></div>
        <div class="small" data-sub></div>
        <div class="small" data-opts></div>
      </div>

      <div class="cart-qty">
        <label class="small">Aantal</label>
        <input data-qty type="number" min="1" step="1" value="1" />
      </div>

      <div class="cart-price" data-total></div>

      <div class="cart-actions">
        <button class="btn btn-danger" type="button" data-remove>Verwijder</button>
      </div>
    </div>
  </template>

  <script src="cart.js"></script>
</body>
</html>
