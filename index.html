<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no" />
  <title>Sunspa Catalogus</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">Sunspa Catalogus</div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="panel-row">
        <div class="field">
          <label for="search">Zoeken</label>
          <input id="search" type="search" placeholder="Zoek op titel, type, specificaties…" />
        </div>

        <div class="field">
          <label for="typeFilter">Type</label>
          <select id="typeFilter">
            <option value="">Alle types</option>
          </select>
        </div>

        <div class="field">
          <label for="sort">Sorteren</label>
          <select id="sort">
            <option value="relevance">Relevantie</option>
            <option value="priceAsc">Prijs (laag → hoog)</option>
            <option value="priceDesc">Prijs (hoog → laag)</option>
            <option value="titleAsc">Titel (A → Z)</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="btnClear" class="btn" type="button">Wissen</button>
        </div>
      </div>

      <div class="panel-row panel-row-2">
        <div class="chips" id="activeChips"></div>
        <div class="small" id="resultMeta">—</div>
      </div>
    </section>

    <section class="grid" id="grid"></section>

    <section class="panel" id="errorBox" style="display:none">
      <div class="panel-title">Fout bij laden</div>
      <div class="small" id="errorText"></div>
      <div class="small" style="margin-top:8px">
        Controleer of <code>products.json</code> bestaat en bereikbaar is.
      </div>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <button class="card-link" type="button" data-open>
        <div class="card-imgwrap">
          <img class="card-img" alt="" loading="lazy" />
          <div class="badge" data-badge></div>
        </div>

        <div class="card-body">
          <div class="card-title" data-title></div>
          <div class="card-price" data-price></div>
          <div class="card-specs" data-specs></div>
          <div class="card-cta">👉 Bekijk details</div>
        </div>
      </button>
    </article>
  </template>

  <div id="productModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>

    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle" class="modal-title">—</h2>
        <div id="modalPrice" class="modal-price">Prijs: —</div>
      </div>

      <div class="modal-body">
        <div class="modal-grid">
          <div class="modal-media">
            <img id="modalImg" alt="" loading="lazy" />
            <div id="modalType" class="modal-type"></div>
          </div>

          <div class="modal-specs">
            <div id="modalSpecs" class="spec-table"></div>

            <hr style="border:none;border-top:1px solid var(--border);margin:14px 0" />

            <div class="panel-title" style="margin:0 0 10px 0;color:white;">Opties</div>

            <div class="options" id="modalOptions" style="color:white;">
              <label class="opt-disabled">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optInstall" type="checkbox" checked disabled />
                    Levering &amp; installatie
                    <span class="opt-price" id="optInstallPrice">€0</span>
                  </div>
                  <div class="small" id="optInstallHint"></div>
                </div>
              </label>

              <label class="opt opt-disabled" id="optCoverTrapRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input type="checkbox" checked disabled />
                    Cover &amp; trap inclusief
                  </div>
                </div>
                <div class="opt-price" style="visibility:hidden;">€0</div>
              </label>

              <label class="opt" id="optCoverliftRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optCoverlift" type="checkbox" />
                    Coverlift € 189
                  </div>
                </div>
                <div class="opt-price" id="optCoverliftTotal" style="visibility:hidden;">€0</div>
              </label>

              <label class="opt" id="optMaintRow">
                <div class="opt-text">
                  <div class="opt-title">
                    <input id="optMaint" type="checkbox" />
                    Onderhoudspakket € 179
                  </div>
                </div>
                <div class="opt-price" id="optMaintTotal" style="visibility:hidden;">€0</div>
              </label>

              <div class="opt opt-row" id="optSwimFiltersetRow" style="display:none">
                <div class="opt-text">
                  <div class="opt-title">Filterset (zwemspa)</div>
                  <div class="small">€250 per set</div>
                </div>
                <div class="opt-qty">
                  <input id="optSwimFiltersetQty" type="number" min="0" step="1" value="0" />
                </div>
              </div>

              <div id="optBarrelStoveGroup" style="display:none">
                <div class="small" style="margin:12px 0 6px 0;font-weight:600;">Kachel</div>

                <label class="opt" id="optBarrelWoodStoveRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelWoodStove" name="barrelStove" type="radio" value="wood" />
                      Houtkachel + rookafvoer € 1245
                    </div>
                  </div>
                  <div class="opt-price" id="optBarrelWoodStoveTotal" style="visibility:hidden;">€0</div>
                </label>

                <label class="opt" id="optBarrelElectricHeaterRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelElectricHeater" name="barrelStove" type="radio" value="electric" />
                      Elektrische kachel 8 kW € 495
                    </div>
                  </div>
                  <div class="opt-price" id="optBarrelElectricHeaterTotal" style="visibility:hidden;">€0</div>
                </label>
              </div>

              <div id="optBarrelRoofGroup" style="display:none">
                <div class="small" style="margin:12px 0 6px 0;font-weight:600;">Dak</div>

                <label class="opt" id="optBarrelRoofShinglesRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelRoofShingles" name="barrelRoof" type="radio" value="shingles" />
                      Shingles dak € 399
                    </div>
                  </div>
                  <div class="opt-price" id="optBarrelRoofShinglesTotal" style="visibility:hidden;">€0</div>
                </label>

                <label class="opt" id="optBarrelRoofHeatherRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelRoofHeather" name="barrelRoof" type="radio" value="heather" />
                      Heidedak € 849
                    </div>
                  </div>
                  <div class="opt-price" id="optBarrelRoofHeatherTotal" style="visibility:hidden;">€0</div>
                </label>

                <label class="opt" id="optBarrelRoofDesignRow">
                  <div class="opt-text">
                    <div class="opt-title">
                      <input id="optBarrelRoofDesign" name="barrelRoof" type="radio" value="design" />
                      Design dak € 899
                    </div>
                  </div>
                  <div class="opt-price" id="optBarrelRoofDesignTotal" style="visibility:hidden;">€0</div>
                </label>
              </div>
            </div>

            <hr style="border:none;border-top:1px solid var(--border);margin:14px 0" />

            <div class="totals" style="color:white;">
              <div class="totals-row"><span>Product </span><strong id="optProductTotal">€0</strong></div>
              <div class="totals-row"><span>Opties </span><strong id="optOptionsTotal">€0</strong></div>
              <div class="totals-row totals-row-big"><span>Totaal </span><strong id="optGrandTotal">€0</strong></div>
              <div class="small">Alle bedragen incl. btw &amp; excl. kraankosten.</div>
            </div>

            <div class="modal-actions">
              <a id="modalUrl" class="btn btn-secondary" target="_blank" rel="noopener">Bekijk op website</a>
              <button id="modalPrint" class="btn btn-primary" type="button">Print</button>
            </div>

            <div class="small" style="margin-top:10px">
              Print maakt een fiche van alleen dit product.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
