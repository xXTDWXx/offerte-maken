<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no" />
  <title>Sunspa Catalogus</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">Sunspa Catalogus</div>
      </div>
      <nav class="category-menu">
  <div class="container category-menu-row">
    <a href="category.html?type=Spa" class="category-link">SPA</a>
    <a href="category.html?type=Zwemspa" class="category-link">ZWEMSPA</a>
    <a href="category.html?type=Barrelsauna" class="category-link">BARRELSAUNA</a>
    <a href="category.html?type=Infrarood" class="category-link">INFRAROOD</a>
    <a href="category.html?type=combi sauna" class="category-link">COMBI SAUNA</a>
    <a href="category.html?type=sauna" class="category-link">FINSE SAUNA</a>
    <a href="category.html?type=sauna pod" class="category-link">SAUNA POD</a>
    <a href="stroom.html" class="category-link">STROOMVEREISTEN</a>
    <a href="oppervlakte.html" class="category-link is-active">WELKE SPA PAST IN UW TUIN?</a>
  </div>
</nav>
    </div>
  </header>

  

  

    <section class="grid" id="grid"></section>

    <section class="panel" id="errorBox" style="display:none">
      <div class="panel-title">Fout bij laden</div>
      <div class="small" id="errorText"></div>
      <div class="small" style="margin-top:8px">
        Controleer of <code>products.json</code> bestaat en bereikbaar is.
      </div>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <button class="card-link" type="button" data-open>
        <div class="card-imgwrap">
          <img class="card-img" alt="" loading="lazy" />
          <div class="badge" data-badge></div>
        </div>

        <div class="card-body">
          <div class="card-title" data-title></div>
          <div class="card-price" data-price></div>
          <div class="card-specs" data-specs></div>
          <div class="card-cta">👉 Bekijk details</div>
        </div>
      </button>
    </article>
  </template>

  <div class="card-cta">Bekijk product</div>

  <script src="app.js"></script>
</body>
</html>
