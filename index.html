<!doctype html>
<html lang="nl"> 
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no" />
  <title>Sunspa Catalogus</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="showroom-menu.css" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" /> 
</head>

<body class="showroom-menu-proposal">
  <section class="container showroom-menu-shell">
    <div class="showroom-logo-row">
      <div class="brand">
        <img src="logo.svg" alt="Sunspa Benelux logo" class="logo" />
      </div>
      <div class="showroom-top-search">
        <label for="search">Zoeken</label>
        <input id="search" type="search" placeholder="Zoek product..." />
      </div>
      <a href="kassa.html" class="category-link kassa showroom-top-kassa">Kassa</a>
      <button class="mobile-menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" data-mobile-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <div class="showroom-menu-panel">
      <div class="showroom-menu-content">
        <nav class="category-menu showroom-primary-menu">
          <div class="category-menu-row">
            <a href="oppervlakte.html" class="category-link menu-keuzehulp">Keuzehulp</a>
            <a href="category.html?type=Spa" class="category-link" data-category-link="Spa">Spa</a>
            <a href="category.html?type=Zwemspa" class="category-link" data-category-link="Zwemspa">Zwemspa</a>
            <a href="category.html?type=Barrelsauna" class="category-link" data-category-link="Barrelsauna">Barrelsauna</a>
            <a href="category.html?type=Infrarood" class="category-link" data-category-link="Infrarood">Infrarood</a>
            <a href="category.html?type=combi sauna" class="category-link" data-category-link="combi sauna">Combi sauna</a>
            <a href="category.html?type=sauna" class="category-link" data-category-link="sauna">Finse sauna</a>
            <a href="category.html?type=sauna pod" class="category-link" data-category-link="sauna pod">Sauna pod</a>
            <a href="hottub.html" class="category-link">Hottub</a>
            <a href="category.html?type=overkappingen" class="category-link" data-category-link="overkappingen">Overkappingen</a>
            <a href="category.html?showroom=all" class="category-link">In de showroom</a>
            <a href="actie.html" class="category-link">Onze acties</a>
          </div>
        </nav>
      </div>
    </div>
  </section>

  <div class="mobile-menu-overlay" data-mobile-menu-overlay></div>
  <aside class="mobile-menu-drawer" data-mobile-menu-drawer aria-hidden="true">
    <div class="mobile-menu-head">
      <div class="mobile-menu-title">Menu</div>
      <button class="mobile-menu-close" type="button" aria-label="Sluit menu" data-mobile-menu-close>&times;</button>
    </div>
    <div class="mobile-menu-content" data-mobile-menu-content></div>
  </aside>

  

  

    <section class="grid" id="grid"></section>

    <section class="panel" id="errorBox" style="display:none">
      <div class="panel-title">Fout bij laden</div>
      <div class="small" id="errorText"></div>
      <div class="small" style="margin-top:8px">
        Controleer of <code>products.json</code> bestaat en bereikbaar is.
      </div>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <button class="card-link" type="button" data-open>
        <div class="card-imgwrap">
          <img class="card-img" alt="" loading="lazy" />
          <div class="badge" data-badge></div>
          <div class="badge badge-location" data-showroom></div>
        </div>

        <div class="card-body">
          <div class="card-title" data-title></div>
          <div class="card-price" data-price></div>
          <div class="card-specs" data-specs></div>
          <div class="card-cta">👉 Bekijk details</div>
        </div>
      </button>
    </article>
  </template>

  <div class="card-cta">Bekijk product</div>

  <script src="i18n.js?v=fr-20260621c"></script>
  <script src="mobile-menu.js"></script>
  <script src="app.js?v=fr-20260621c"></script>
</body>
</html>
