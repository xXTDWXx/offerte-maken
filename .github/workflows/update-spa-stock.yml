name: Update spa stock

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build stock JSON
        shell: pwsh
        env:
          SUNSPA_DEALER_PASSWORD: ${{ secrets.SUNSPA_DEALER_PASSWORD }}
        run: |
          .\scripts\update-spa-stock.ps1 | Out-File -FilePath .\spa-stock.json -Encoding utf8

      - name: Commit stock JSON when changed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spa-stock.json
          if (git diff --cached --quiet) {
            Write-Host "No stock changes."
          } else {
            git commit -m "Update spa stock"
            git push
          }
