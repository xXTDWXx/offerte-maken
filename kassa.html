<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kassa kleine producten</title>
<link rel="stylesheet" href="styles.css" />
<style>
:root {
  --kassa-line: #d8e0e9;
  --kassa-muted: #64748b;
  --kassa-blue: #407298;
  --kassa-green: #2f7a5f;
  --kassa-red: #b42318;
}

body {
  margin: 0;
  background: #f6f8fb;
  color: #0f172a;
  font-family: "Segoe UI", Arial, Helvetica, sans-serif;
}

.btn {
  border: 1px solid var(--kassa-line);
  background: #fff;
  color: #0f172a;
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 46px;
  font-size: 1rem;
}

.btn:hover { border-color: #9fb3c8; }
.btn-primary { background: #e8f3fb; border-color: #b9d7ec; color: #234d6e; }
.btn-danger { background: #fff5f4; border-color: #f3b9b3; color: var(--kassa-red); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.showroom-gate {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.showroom-panel {
  width: min(540px, 100%);
  background: #fff;
  border: 1px solid var(--kassa-line);
  border-radius: 8px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, .08);
  padding: 34px;
}

.showroom-panel h1 {
  margin: 0 0 22px;
  font-size: clamp(28px, 5vw, 42px);
  line-height: 1;
  letter-spacing: 0;
  color: #18364f;
}

.showroom-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.showroom-option {
  min-height: 108px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 8px;
  text-align: left;
  border: 1px solid var(--kassa-line);
  border-radius: 8px;
  background: #fdfefe;
  padding: 18px;
  cursor: pointer;
}

.showroom-option strong {
  font-size: 24px;
  line-height: 1.1;
}

.showroom-option span {
  color: var(--kassa-muted);
  font-size: 14px;
}

.showroom-option:hover {
  border-color: #84a9c7;
  background: #f2f8fc;
}

.kassa-app[hidden],
.showroom-gate[hidden] {
  display: none !important;
}

.kassa-header {
  position: sticky;
  top: 0;
  z-index: 2;
  background: #fff;
  border-bottom: 1px solid var(--kassa-line);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.kassa-title {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.kassa-title h1 {
  margin: 0;
  font-size: 22px;
  line-height: 1.1;
  letter-spacing: 0;
  color: #18364f;
}

.showroom-badge,
.backend-badge {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  border-radius: 8px;
  padding: 4px 10px;
  background: #edf7f2;
  color: var(--kassa-green);
  border: 1px solid #c6e5d6;
  font-weight: 800;
  font-size: 13px;
}

.backend-badge {
  background: #eef3f8;
  color: #31516f;
  border-color: #ccdae7;
}

.grid-products {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px;
  margin: 20px;
  padding-bottom: 92px;
}

.product-card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  transition: transform .2s, box-shadow .2s, border-color .2s;
  min-width: 0;
}

.product-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
}

.product-card.is-empty {
  border-color: #f0c4bf;
  background: #fffafa;
}

.img-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #f1f5f9;
}

.product-img {
  max-width: 100%;
  max-height: 100%;
  height: auto;
  width: auto;
  display: block;
}

.product-title {
  font-weight: 700;
  font-size: 14px;
  color: #0f172a;
  min-height: 38px;
  line-height: 1.35;
}

.product-price {
  font-weight: 800;
  color: var(--kassa-blue);
}

.stock-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: var(--kassa-muted);
  font-size: 13px;
  border-top: 1px solid #edf2f7;
  padding-top: 9px;
}

.stock-value {
  color: #0f172a;
  font-weight: 800;
}

.stock-value.low { color: #b54708; }
.stock-value.empty { color: var(--kassa-red); }

.counter {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: auto;
}

.counter button {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  background: #fff;
  font-weight: 900;
  cursor: pointer;
  flex: 0 0 auto;
}

.counter button:disabled {
  opacity: .4;
  cursor: not-allowed;
}

.counter span {
  min-width: 28px;
  text-align: center;
  font-weight: 800;
}

.status-line {
  margin: 20px;
  padding: 14px 16px;
  border: 1px solid var(--kassa-line);
  border-radius: 8px;
  background: #fff;
  color: #334155;
}

.status-line.error {
  border-color: #f3b9b3;
  background: #fff7f6;
  color: var(--kassa-red);
}

.total-bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 3;
  background: #fff;
  padding: 14px 20px;
  border-top: 2px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.total-bar strong,
#total {
  font-size: 18px;
}

.total-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

@media (max-width: 1100px) {
  .grid-products { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 760px) {
  .grid-products { grid-template-columns: repeat(2, minmax(0, 1fr)); margin: 14px; gap: 14px; }
  .showroom-options { grid-template-columns: 1fr; }
  .showroom-panel { padding: 24px; }
}

@media (max-width: 560px) {
  .grid-products { grid-template-columns: 1fr; }
  .kassa-header, .total-bar { align-items: stretch; }
  .total-actions, .total-actions .btn { width: 100%; }
}
</style>
</head>
<body>
<section class="showroom-gate" id="showroomGate">
  <div class="showroom-panel">
    <h1>SELECTEER SHOWROOM</h1>
    <div class="showroom-options" role="group" aria-label="Selecteer showroom">
      <button class="showroom-option" type="button" data-showroom="gent">
        <strong>Gent</strong>
        <span>Gebruik voorraad van showroom Gent</span>
      </button>
      <button class="showroom-option" type="button" data-showroom="brugge">
        <strong>Brugge</strong>
        <span>Gebruik voorraad van showroom Brugge</span>
      </button>
    </div>
  </div>
</section>

<main class="kassa-app" id="kassaApp" hidden>
  <header class="kassa-header">
    <div class="kassa-title">
      <h1>Kassa kleine producten</h1>
      <span class="showroom-badge" id="showroomBadge"></span>
      <span class="backend-badge" id="backendBadge"></span>
    </div>
    <button class="btn" type="button" id="changeShowroomBtn">Andere showroom</button>
  </header>

  <div class="status-line" id="statusLine">Voorraad laden...</div>
  <div class="grid-products" id="grid"></div>

  <div class="total-bar">
    <div><strong>Totaal:</strong> <span id="total">&euro; 0,00</span></div>
    <div class="total-actions">
      <button class="btn" type="button" id="refreshStockBtn">Voorraad vernieuwen</button>
      <button class="btn btn-danger" type="button" id="resetBtn">Reset</button>
      <button class="btn btn-primary" type="button" id="printBtn">Bon printen</button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="kassa-stock.js"></script>
</body>
</html>
