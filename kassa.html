<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kassa kleine producten</title>
<link rel="stylesheet" href="styles.css" />
<style>
.btn {border: 1px solid var(--finder-line);background: rgb(255 255 255);color: black;padding: 12px 16px;border-radius: 14px;cursor: pointer;
  font-weight: 700;text-decoration: none;display: inline-flex;align-items: center;justify-content: center;gap: 8px;min-height: 48px;font-size: 1rem;}
.btn-primary {background: rgba(56, 189, 248, 0.16);border-color: rgba(56, 189, 248, 0.35);}
.grid-products{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin:20px}
.product-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px;box-shadow:0 6px 18px rgba(0,0,0,0.05);transition:transform .2s, box-shadow .2s}
.product-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,0.08)}
.img-wrap{width:100%;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #f1f5f9}
.product-img{width: fit-content;}
.product-title{font-weight:700;font-size:14px;color:#0f172a;min-height:38px;line-height:1.35}
.product-price{font-weight:800;color:#407298}
.counter{display:flex;gap:8px;align-items:center;margin-top:auto;margin-left: 13px;}
.counter button{width:34px;height:34px;border-radius:8px;border:1px solid #ccc;background:#fff;font-weight:bold;cursor:pointer}
.counter span{min-width:24px;text-align:center;font-weight:700}
.total-bar{position:sticky;bottom:0;background:#fff;padding:16px;border-top:2px solid #ddd;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
@media (max-width:1100px){.grid-products{grid-template-columns:repeat(4,1fr)}}
@media (max-width:560px){.grid-products{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid-products" id="grid"></div>
<div class="total-bar">
<div><strong>Totaal:</strong> <span id="total">€0</span></div>
<div>
<button class="btn btn-primary" onclick="resetAll()">Reset</button>
<button class="btn btn-primary" onclick="printBon()">Bon printen</button>
</div>
</div>
<script>
const COMPANY_NAME = 'Sunspa Benelux';
const COMPANY_EMAIL = 'sunspabrugge@gmail.com';
const COMPANY_PHONE = '0483399967';
const COMPANY_WEBSITE = 'www.sunspabenelux.be';

let products=[];
let cart={};

fetch('kleineproducten.json').then(r=>r.json()).then(data=>{
products=data;
render();
});

function euro(n){return '€ '+n.toFixed(2).replace('.',',');}

function render(){
const grid=document.getElementById('grid');
grid.innerHTML='';
products.forEach(p=>{
const qty=cart[p.id]||0;
const el=document.createElement('div');
el.className='product-card';
el.innerHTML=`
  <div class="img-wrap">
    ${p.image ? `<img src="${p.image}" class="product-img" alt="${p.title}">` : ''}
  </div>
  <div class="product-title">${p.title}</div>
  <div class="product-price">${euro(p.price)}</div>
  <div class="counter">
    <button onclick="change('${p.id}',-1)">-</button>
    <span>${qty}</span>
    <button onclick="change('${p.id}',1)">+</button>
  </div>`;
grid.appendChild(el);
});
updateTotal();
}

function change(id,delta){cart[id]=(cart[id]||0)+delta;if(cart[id]<0)cart[id]=0;render();}

function updateTotal(){let t=0;products.forEach(p=>{t+=(cart[p.id]||0)*p.price});document.getElementById('total').innerText=euro(t);} 

function resetAll(){cart={};render();}

function printBon(){
  const selected = products.filter(p => (cart[p.id] || 0) > 0);
  if (!selected.length) {
    alert('Selecteer eerst minstens 1 product.');
    return;
  }

  let totalIncl = 0;

  const rows = selected.map((p, index) => {
    const qty = cart[p.id] || 0;
    const line = qty * Number(p.price || 0);
    totalIncl += line;

    return `
      <tr>
        <td class="col-num">${index + 1}</td>
        <td class="col-desc">${p.title} <span style="font-weight:400;color:#64748b;">x ${qty}</span></td>
        <td class="col-price">${euro(line)}</td>
      </tr>
    `;
  }).join('');

  const subtotal = totalIncl / 1.21;
  const btw = totalIncl - subtotal;

  const today = new Date();

  const logoHtml = `<img src="logo.svg" class="offer-logo">`;

  const win = window.open('', '_blank');

  win.document.write(`
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Bon</title>

<style>
${document.querySelector('style').innerHTML}
</style>

</head>
<body>

<div class="sheet">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        ${logoHtml}
      </div>
      <div class="offer-meta">
        <div class="offer-meta-row">
          <div class="offer-meta-label">Datum</div>
          <div class="offer-meta-value">${formatDateBelgium(today)}</div>
        </div>
        <div class="offer-meta-row">
          <div class="offer-meta-label">Geldig tot</div>
          <div class="offer-meta-value offer-meta-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="content">

    <div class="info-grid info-grid-single">
      <div class="card customer-card">
        <div class="card-title">Klantgegevens</div>

        <div class="customer-inline-grid">
          <div class="field-inline"><span class="label-inline">Naam</span><span class="line-inline"></span></div>
          <div class="field-inline"><span class="label-inline">Telefoon</span><span class="line-inline"></span></div>
          <div class="field-inline"><span class="label-inline">Adres</span><span class="line-inline"></span></div>
          <div class="field-inline"><span class="label-inline">Telefoon 2</span><span class="line-inline"></span></div>
          <div class="field-inline"><span class="label-inline">Plaats</span><span class="line-inline"></span></div>
          <div class="field-inline"><span class="label-inline">Email</span><span class="line-inline"></span></div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Omschrijving</th>
            <th style="text-align:right">Prijs</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>

    <div class="summary">
      <div class="summary-left">
        <div class="summary-line"><span>Voorschot</span><span class="line-fill"></span></div>
        <div class="summary-line"><span>Leveringstermijn</span><span class="line-fill"></span></div>
      </div>

      <div class="summary-box">
        <div class="summary-row"><span>Subtotaal excl. btw</span><strong>${euro(subtotal)}</strong></div>
        <div class="summary-row"><span>21% btw</span><strong>${euro(btw)}</strong></div>
        <div class="summary-row total"><span>Totaal</span><strong>${euro(totalIncl)}</strong></div>
      </div>
    </div>

    <div class="signature-section">
      <div class="signature-grid">
        <div class="signature-box"><div class="signature-label">Naam koper</div><div class="signature-line"></div></div>
        <div class="signature-box"><div class="signature-label">Handtekening koper</div><div class="signature-line"></div></div>
        <div class="signature-box"><div class="signature-label">Naam verkoper</div><div class="signature-line"></div></div>
        <div class="signature-box"><div class="signature-label">Handtekening verkoper</div><div class="signature-line"></div></div>
      </div>
    </div>

    <div class="terms">
      <h4 class="terms-title">Opmerkingen</h4>
      <ul>
        <li>Prijzen showroomproducten inclusief btw.</li>
      </ul>
    </div>

    <div class="footer">
      <div>Met vriendelijke groeten,<br><strong>Team Sunspa Brugge/Lievegem</strong></div>
      <div>Wellnessmarkt BV | BE 0843 104 796 | BE75 3800 1777 8151<br>
      Sunspa Benelux | 0483 39 99 67 | sunspabrugge@gmail.com/gentsunspa@gmail.com</div>
    </div>

  </div>
</div>

<script>
window.onload = () => setTimeout(() => window.print(), 200);
</script>

</body>
</html>
`);
}
</script>
</body>
</html>
